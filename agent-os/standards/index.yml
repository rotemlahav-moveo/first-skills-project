# Agent OS Standards Index

standards:
  - id: frontend/new-section-component-hierarchy
    title: New Section Component Hierarchy
    path: frontend/new-section-component-hierarchy.md
    summary: Every new UI section must be extracted into a separate component and placed with clear architecture and hierarchy.
  - id: frontend/forms-rhf-config-standard
    title: Frontend Forms RHF Config Standard
    path: frontend/forms-rhf-config-standard.md
    summary: Build all frontend forms with React Hook Form and Zod, and render fields from typed config arrays via shared reusable components.
  - id: backend/feature-structure
    title: Backend Feature Structure
    path: backend/feature-structure.md
    summary: Organize each backend feature by controllers, services, dto, and entities with a feature module at the root.
  - id: global/shared-code-in-libs
    title: Shared Code In Libs
    path: global/shared-code-in-libs.md
    summary: Place all reusable or cross-app code in libs and keep apps focused on app-specific wiring.

