name: Deploy Snapstyle

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npx nx build backend

      - name: Build frontend
        run: |
          echo "VITE_API_BASE_URL=/api" > apps/front/.env.production
          npx vite build --config apps/front/vite.config.mts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  deploy:
    needs: build
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Clean old dist
        run: rm -rf /home/ubuntu/first-skills-project/dist

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: /home/ubuntu/first-skills-project/dist

      - name: Restart backend with PM2
        run: |
          cd /home/ubuntu/first-skills-project
          pm2 delete snapstyle-backend || true
          pm2 start dist/apps/backend/main.js --name snapstyle-backend
          pm2 save

      - name: Deploy frontend to Nginx
        run: |
          sudo rm -rf /var/www/snapstyle/*
          sudo cp -r /home/ubuntu/first-skills-project/dist/front/* /var/www/snapstyle/

      - name: Reload Nginx
        run: sudo systemctl reload nginx