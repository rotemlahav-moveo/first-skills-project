services:
  postgres:
    image: postgres:16
    container_name: first-skills-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: snap_style
      POSTGRES_PASSWORD: snap_style
      POSTGRES_DB: snapStyle_db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U snap_style -d snapStyle_db']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: first-skills-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: snap_style
      DB_PASSWORD: snap_style
      DB_NAME: snapStyle_db
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/front/Dockerfile
    container_name: first-skills-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: first-skills-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: